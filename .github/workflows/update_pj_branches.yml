name: Update PJ Branches

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v3
      - name: List PJ branches
        id: pj_list
        run: |
          git remote set-branches origin '*'
          git fetch
          pj_list=$(git branch -r --list '*/pj-*' --format='%(refname:short)' | sed 's/origin\///g' | tr '\n' ' ' |sed 's/ $/\n/')
          echo "::set-output name=branches::$pj_list"
      
      - name: Create develop_to_pj branch 
        run: |
          for branch in ${{steps.pj_list.outputs.branches}}; do
            git branch develop_to_${branch} origin/${branch}
            git push origin develop_to_${branch}
          done
      
      - name: Try to merge develop
        run: |
          for branch in ${{steps.pj_list.outputs.branches}}; do
            git checkout develop_to_${branch}
            canmerge=$(git merge --no-ff --no-commit develop)
            echo $canmerge
            git merge --abort
          done
